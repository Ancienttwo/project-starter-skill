<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{TITLE}}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        /* ========== RESET ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* ========== CSS VARIABLES ========== */
        :root {
            /* Primary colors - customize per presentation */
            --primary: #FF9500;
            --primary-light: #FFB84D;
            --primary-soft: #FFF4E6;

            /* Secondary colors */
            --secondary: #6366F1;
            --accent: #10B981;
            --danger: #EF4444;
            --warning: #F59E0B;

            /* Backgrounds - light theme for education/professional */
            --bg-warm: #FFFBF7;
            --bg-cream: #FEF7ED;
            --bg-soft: #F8FAFC;

            /* Text colors */
            --text-dark: #1E293B;
            --text-body: #475569;
            --text-muted: #94A3B8;

            /* Borders and shadows */
            --border-light: #E2E8F0;
            --shadow-soft: 0 4px 20px rgba(0,0,0,0.06);
        }

        /* ========== BASE STYLES ========== */
        html {
            scroll-behavior: smooth;
            scroll-snap-type: y mandatory;
            overflow-x: hidden;
        }

        body {
            font-family: 'Nunito', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-warm);
            color: var(--text-dark);
            line-height: 1.5;
            overflow-x: hidden;
        }

        /* ========== SLIDE CONTAINER ========== */
        .slide {
            height: 100vh;
            width: 100vw;
            padding: clamp(24px, 4vh, 48px) clamp(32px, 5vw, 80px);
            padding-right: clamp(48px, 6vw, 100px);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            scroll-snap-align: start;
            background: var(--bg-warm);
        }

        .slide-number {
            position: absolute;
            bottom: clamp(16px, 2vh, 24px);
            right: clamp(48px, 6vw, 80px);
            font-family: 'Quicksand', sans-serif;
            font-size: clamp(11px, 1.2vh, 14px);
            color: var(--text-muted);
            font-weight: 600;
        }

        /* ========== TYPOGRAPHY ========== */
        h1 {
            font-family: 'Quicksand', sans-serif;
            font-size: clamp(2rem, 5vw, 4rem);
            font-weight: 700;
            color: var(--primary);
            margin-bottom: clamp(8px, 1.5vh, 16px);
            line-height: 1.1;
        }

        h2 {
            font-family: 'Quicksand', sans-serif;
            font-size: clamp(1.5rem, 3.5vw, 2.5rem);
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: clamp(6px, 1vh, 12px);
        }

        h3 {
            font-family: 'Quicksand', sans-serif;
            font-size: clamp(1rem, 1.8vw, 1.3rem);
            font-weight: 600;
            color: var(--primary);
            margin-bottom: clamp(6px, 1vh, 12px);
        }

        p {
            font-size: clamp(0.85rem, 1.3vw, 1.1rem);
            color: var(--text-body);
            margin-bottom: clamp(8px, 1.2vh, 14px);
            line-height: 1.6;
        }

        /* ========== CONTENT WRAPPER ========== */
        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: clamp(12px, 2vh, 24px);
            justify-content: center;
        }

        /* ========== COVER SLIDE ========== */
        .cover {
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .cover .logo {
            font-size: clamp(4rem, 10vw, 8rem);
            margin-bottom: clamp(12px, 2vh, 24px);
        }

        .cover h1 {
            font-size: clamp(2.5rem, 7vw, 5rem);
        }

        .tagline {
            font-family: 'Quicksand', sans-serif;
            font-size: clamp(1rem, 2.2vw, 1.6rem);
            color: var(--text-body);
            margin-top: clamp(8px, 1.5vh, 16px);
            font-weight: 500;
        }

        .subtitle {
            font-size: clamp(0.8rem, 1.4vw, 1rem);
            color: var(--text-muted);
            margin-top: clamp(16px, 3vh, 32px);
            padding: clamp(8px, 1.2vh, 12px) clamp(16px, 2vw, 24px);
            background: var(--primary-soft);
            border-radius: 50px;
            display: inline-block;
        }

        /* ========== STAT GRID (2x3 layout) ========== */
        .stat-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: clamp(12px, 2vw, 24px);
            margin: clamp(12px, 2vh, 24px) 0;
        }

        .stat-card {
            background: white;
            border-radius: clamp(8px, 1.2vw, 16px);
            padding: clamp(12px, 2vh, 24px) clamp(10px, 1.5vw, 16px);
            text-align: center;
            border: 1px solid var(--border-light);
        }

        .stat-number {
            font-family: 'Quicksand', sans-serif;
            font-size: clamp(1.5rem, 3vw, 2.5rem);
            font-weight: 700;
            color: var(--primary);
            display: block;
            line-height: 1.1;
        }

        .stat-label {
            font-size: clamp(0.65rem, 1vw, 0.85rem);
            color: var(--text-muted);
            margin-top: clamp(4px, 0.6vh, 8px);
            line-height: 1.3;
        }

        /* ========== TWO COLUMN LAYOUT ========== */
        .two-column {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: clamp(20px, 3vw, 48px);
            align-items: start;
        }

        /* ========== COMPARISON CARDS ========== */
        .comparison {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: clamp(16px, 2.5vw, 32px);
            margin: clamp(12px, 2vh, 24px) 0;
        }

        .comparison-card {
            padding: clamp(16px, 2.5vh, 32px);
            border-radius: clamp(12px, 1.5vw, 20px);
        }

        .comparison-card.bad {
            background: #FEF2F2;
            border: 2px solid #FECACA;
        }

        .comparison-card.good {
            background: #F0FDF4;
            border: 2px solid #BBF7D0;
        }

        .comparison-card.bad h3 { color: var(--danger); }
        .comparison-card.good h3 { color: var(--accent); }

        .comparison-card ul { margin: 0; }

        .comparison-card li {
            font-size: clamp(0.75rem, 1.2vw, 0.95rem);
            padding: clamp(4px, 0.6vh, 8px) 0;
            padding-left: clamp(24px, 3vw, 32px);
        }

        .comparison-card.bad li::before {
            content: '✗';
            color: var(--danger);
        }

        .comparison-card.good li::before {
            content: '✓';
            color: var(--accent);
        }

        /* ========== LISTS ========== */
        ul {
            list-style: none;
            margin: clamp(8px, 1.2vh, 16px) 0;
        }

        ul li {
            padding: clamp(4px, 0.7vh, 10px) 0;
            padding-left: clamp(20px, 2.5vw, 28px);
            position: relative;
            font-size: clamp(0.8rem, 1.2vw, 1rem);
            color: var(--text-body);
        }

        ul li::before {
            content: '→';
            position: absolute;
            left: 0;
            color: var(--primary);
            font-weight: 700;
        }

        /* ========== TABLE ========== */
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: clamp(0.7rem, 1vw, 0.9rem);
            margin: clamp(10px, 1.5vh, 20px) 0;
        }

        th, td {
            padding: clamp(8px, 1.2vh, 14px) clamp(10px, 1.5vw, 16px);
            text-align: left;
            border-bottom: 1px solid var(--border-light);
        }

        th {
            background: var(--primary-soft);
            color: var(--primary);
            font-weight: 700;
            font-family: 'Quicksand', sans-serif;
        }

        /* ========== QUOTE ========== */
        .quote {
            font-size: clamp(0.9rem, 1.5vw, 1.2rem);
            font-style: italic;
            padding: clamp(12px, 2vh, 24px) clamp(16px, 2.5vw, 32px);
            border-left: 4px solid var(--primary);
            background: var(--primary-soft);
            margin: clamp(10px, 1.5vh, 20px) 0;
            border-radius: 0 clamp(8px, 1.2vw, 12px) clamp(8px, 1.2vw, 12px) 0;
            color: var(--text-dark);
        }

        .quote-author {
            font-size: clamp(0.7rem, 1vw, 0.9rem);
            color: var(--text-muted);
            margin-top: clamp(6px, 1vh, 12px);
            font-style: normal;
            font-weight: 600;
        }

        /* ========== CODE/DIAGRAM BLOCKS ========== */
        .flow-diagram, .architecture {
            font-family: 'SF Mono', 'Monaco', 'Inconsolata', 'Fira Code', 'Courier New', monospace;
            background: white;
            padding: clamp(16px, 2.5vh, 28px);
            border-radius: clamp(10px, 1.5vw, 16px);
            white-space: pre;
            overflow-x: auto;
            font-size: clamp(0.65rem, 1vw, 0.85rem);
            line-height: 1.6;
            border: 1px solid var(--border-light);
            color: var(--text-dark);
        }

        /* ========== HIGHLIGHT ========== */
        .highlight {
            color: var(--primary);
            font-weight: 700;
        }

        /* ========== PILL/TAG ========== */
        .pill {
            display: inline-block;
            padding: clamp(4px, 0.6vh, 6px) clamp(10px, 1.5vw, 16px);
            background: var(--primary-soft);
            border-radius: 50px;
            font-size: clamp(0.7rem, 1vw, 0.85rem);
            color: var(--primary);
            font-weight: 600;
        }

        /* ========== CTA BUTTON ========== */
        .cta-button {
            display: inline-block;
            padding: clamp(12px, 2vh, 20px) clamp(32px, 5vw, 56px);
            background: var(--primary);
            color: white;
            font-size: clamp(1rem, 1.5vw, 1.2rem);
            font-weight: 700;
            font-family: 'Quicksand', sans-serif;
            border-radius: 50px;
            text-decoration: none;
            margin-top: clamp(16px, 3vh, 32px);
        }

        /* ========== NAVIGATION DOTS ========== */
        .nav {
            position: fixed;
            right: clamp(12px, 1.5vw, 20px);
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: clamp(6px, 0.8vh, 10px);
            z-index: 1000;
            padding: clamp(8px, 1vh, 12px);
            background: rgba(255,255,255,0.9);
            border-radius: 50px;
            backdrop-filter: blur(8px);
        }

        .nav-dot {
            width: clamp(8px, 1vh, 12px);
            height: clamp(8px, 1vh, 12px);
            border-radius: 50%;
            background: var(--border-light);
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid transparent;
        }

        .nav-dot:hover {
            background: var(--primary-light);
            transform: scale(1.2);
        }

        .nav-dot.active {
            background: var(--primary);
            transform: scale(1.3);
        }

        /* ========== RESPONSIVE: TABLET ========== */
        @media (max-width: 1200px) {
            .two-column, .comparison {
                grid-template-columns: 1fr;
                gap: clamp(12px, 2vh, 20px);
            }
        }

        /* ========== RESPONSIVE: MOBILE ========== */
        @media (max-width: 768px) {
            .slide {
                padding: 20px;
                padding-right: 48px;
            }

            .nav {
                right: 8px;
                gap: 4px;
                padding: 6px;
            }

            .nav-dot {
                width: 6px;
                height: 6px;
            }

            .stat-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        /* ========== PRINT STYLES ========== */
        @media print {
            @page {
                size: 297mm 167mm; /* 16:9 landscape */
                margin: 0;
            }

            * {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
                color-adjust: exact !important;
                /* Disable unsupported effects */
                box-shadow: none !important;
                text-shadow: none !important;
                backdrop-filter: none !important;
                -webkit-backdrop-filter: none !important;
            }

            html {
                scroll-snap-type: none;
                overflow: visible !important;
                height: auto !important;
            }

            body {
                margin: 0;
                padding: 0;
                overflow: visible !important;
                height: auto !important;
                background: white !important;
            }

            .slide {
                width: 297mm;
                height: 167mm;
                padding: 10mm 14mm;
                page-break-after: always;
                page-break-inside: avoid;
                break-after: page;
                break-inside: avoid;
                overflow: hidden;
                box-sizing: border-box;
                position: relative;
                display: flex;
                flex-direction: column;
                background: #FFFBF7 !important;
            }

            .slide:last-child {
                page-break-after: auto;
                break-after: auto;
            }

            .nav {
                display: none !important;
            }

            /* Solid colors for print - no gradients */
            .cover h1 {
                background: none !important;
                -webkit-background-clip: unset !important;
                background-clip: unset !important;
                -webkit-text-fill-color: var(--primary) !important;
                color: var(--primary) !important;
            }

            .stat-card {
                background: white !important;
                border: 1px solid #E2E8F0 !important;
            }

            .comparison-card.bad {
                background: #FEF2F2 !important;
                border: 1px solid #FECACA !important;
            }

            .comparison-card.good {
                background: #F0FDF4 !important;
                border: 1px solid #BBF7D0 !important;
            }

            .quote {
                background: #FFF4E6 !important;
                border-left: 3px solid var(--primary) !important;
            }

            .pill, .subtitle {
                background: #FFF4E6 !important;
                border: 1px solid #FFB84D !important;
            }

            .cta-button {
                background: var(--primary) !important;
            }

            .flow-diagram, .architecture {
                background: white !important;
                border: 1px solid #E2E8F0 !important;
            }

            table {
                border: 1px solid #E2E8F0 !important;
            }

            th {
                background: #FFF4E6 !important;
            }

            /* Force 3-column stat grid for print */
            .stat-grid {
                display: grid !important;
                grid-template-columns: repeat(3, 1fr) !important;
                gap: 3mm !important;
            }

            /* Print typography */
            h1 { font-size: 26pt; margin-bottom: 3mm; }
            h2 { font-size: 20pt; margin-bottom: 2mm; }
            h3 { font-size: 12pt; margin-bottom: 2mm; }
            p, li, td { font-size: 9pt; }
            .stat-number { font-size: 18pt; }
            .stat-label { font-size: 7pt; }
            .quote { font-size: 9pt; padding: 5mm; }
            .flow-diagram, .architecture { font-size: 6pt; padding: 5mm; }

            /* Print spacing */
            .content { gap: 3mm; flex: 1; }
            .stat-grid { margin: 3mm 0; }
            .stat-card { padding: 4mm; }
            .comparison { gap: 5mm; margin: 3mm 0; }
            .comparison-card { padding: 5mm; }
            .two-column { gap: 6mm; }
            ul { margin: 2mm 0; }
            ul li { padding: 1mm 0; padding-left: 5mm; font-size: 8pt; }
            table { font-size: 7pt; }
            th, td { padding: 1.5mm 2mm; }
            .slide-number { font-size: 7pt; bottom: 3mm; right: 5mm; }
        }
    </style>
</head>
<body>

<nav class="nav" id="nav"></nav>

<!-- Slide 1: Cover -->
<section class="slide cover" id="slide1">
    <div class="logo">{{LOGO_EMOJI}}</div>
    <h1>{{PRODUCT_NAME}}</h1>
    <p class="tagline">{{TAGLINE}}</p>
    <div class="subtitle">{{SUBTITLE}}</div>
    <div class="slide-number">1 / {{TOTAL_SLIDES}}</div>
</section>

<!-- Slide 2: Example Content Slide -->
<section class="slide" id="slide2">
    <div class="content">
        <h2>{{SLIDE_TITLE}}</h2>
        <h3>{{SLIDE_SUBTITLE}}</h3>

        <p>Content goes here...</p>
    </div>
    <div class="slide-number">2 / {{TOTAL_SLIDES}}</div>
</section>

<script>
    // Navigation dots
    const slides = document.querySelectorAll('.slide');
    const nav = document.getElementById('nav');

    slides.forEach((slide, index) => {
        const dot = document.createElement('div');
        dot.className = 'nav-dot';
        dot.addEventListener('click', () => {
            slide.scrollIntoView({ behavior: 'smooth' });
        });
        nav.appendChild(dot);
    });

    const navDots = document.querySelectorAll('.nav-dot');

    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                const index = Array.from(slides).indexOf(entry.target);
                navDots.forEach((dot, i) => {
                    dot.classList.toggle('active', i === index);
                });
            }
        });
    }, { threshold: 0.5 });

    slides.forEach(slide => observer.observe(slide));

    // Keyboard navigation
    document.addEventListener('keydown', (e) => {
        const current = Array.from(slides).findIndex(s =>
            s.getBoundingClientRect().top >= 0 && s.getBoundingClientRect().top < window.innerHeight / 2
        );

        if (e.key === 'ArrowDown' || e.key === ' ' || e.key === 'PageDown') {
            e.preventDefault();
            if (current < slides.length - 1) {
                slides[current + 1].scrollIntoView({ behavior: 'smooth' });
            }
        } else if (e.key === 'ArrowUp' || e.key === 'PageUp') {
            e.preventDefault();
            if (current > 0) {
                slides[current - 1].scrollIntoView({ behavior: 'smooth' });
            }
        }
    });
</script>

</body>
</html>
